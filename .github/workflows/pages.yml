name: Deploy to GitHub Pages

# Reliable static deploy via GitHub Actions (replaces the flaky legacy branch/Jekyll builder).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # checkout@v5 targets Node 24 (v4 triggered the runner's Node-20 deprecation warning). The pages
      # actions below are on their latest majors; their warnings clear when upstream ships Node-24 builds.
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site: the repo root is served as-is (index.html at /). .nojekyll disables Jekyll.
          path: '.'
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
